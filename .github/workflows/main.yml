name: Automate ML CI

on:
  push:

jobs:

  train-model:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Run Training File
      run: python train.py